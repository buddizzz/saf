name = "saf-api"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

# القيم السرية الحقيقية تُضاف عبر `wrangler secret put` أو ملف .dev.vars محليًا.
# JWT_SECRET, PHONE_ENCRYPTION_KEY, WHATSAPP_TOKEN, WHATSAPP_PHONE_NUMBER_ID,
# WHATSAPP_VERIFY_TOKEN, WHATSAPP_TEMPLATE_NAME
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
PUBLIC_WEB_ORIGIN = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "saf-db"
database_id = "local-saf-db"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "SHOP_QUEUE"
class_name = "ShopQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShopQueue"]

[[r2_buckets]]
binding = "BRAND_ASSETS"
bucket_name = "saf-brand-assets"

[triggers]
crons = ["*/15 * * * *"]

# —— إنتاج (api.safapp.net) ——
# حدّث database_id بعد: wrangler d1 create saf-db
# ثم: wrangler deploy --env production
[env.production]
name = "saf-api"
vars = { ENVIRONMENT = "production", ALLOWED_ORIGINS = "https://safapp.net,https://www.safapp.net,https://admin.safapp.net", PUBLIC_WEB_ORIGIN = "https://safapp.net" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "saf-db"
database_id = "REPLACE_WITH_PRODUCTION_D1_ID"
migrations_dir = "migrations"

[[env.production.durable_objects.bindings]]
name = "SHOP_QUEUE"
class_name = "ShopQueue"

[[env.production.r2_buckets]]
binding = "BRAND_ASSETS"
bucket_name = "saf-brand-assets"

[env.production.triggers]
crons = ["*/15 * * * *"]
