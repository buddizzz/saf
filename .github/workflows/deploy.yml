# نشر صفّ على Cloudflare (Workers + Pages)
#
# هذا الـ workflow ذاتي التهيئة: عند أول تشغيل ينشئ قاعدة D1 وحاوية R2
# ومشاريع Pages تلقائيًا إن لم تكن موجودة (باستخدام wrangler)، ويحدّث
# database_id في wrangler.toml داخل بيئة التشغيل فقط (لا يُرفع لـ Git).
#
# المطلوب مرة واحدة قبل أول تشغيل:
#   1. أسرار مستودع GitHub (Settings → Secrets and variables → Actions → Secrets):
#        CLOUDFLARE_API_TOKEN   — صلاحيات: D1 Edit + R2 Edit + Workers Scripts Edit + Pages Edit
#        CLOUDFLARE_ACCOUNT_ID
#   2. JWT_SECRET و PHONE_ENCRYPTION_KEY يُولَّدان تلقائيًا عند أول تشغيل إن لم
#      يكونا موجودين (لا حاجة لإضافتهما يدويًا). حملات واتساب الحقيقية تحتاج
#      قيمًا فعلية من Meta — تبقى stub/log محليًا حتى تُضاف يدويًا:
#        cd apps/api && wrangler login
#        wrangler secret put WHATSAPP_TOKEN --env production
#        wrangler secret put WHATSAPP_PHONE_NUMBER_ID --env production
#        wrangler secret put WHATSAPP_VERIFY_TOKEN --env production
#        wrangler secret put WHATSAPP_TEMPLATE_NAME --env production
#   3. اختياري — متغير مستودع GitHub لنطاق مخصّص للـ API:
#        Settings → Secrets and variables → Actions → Variables → API_BASE_URL=https://api.safapp.net
#      بدونه، تُستخدم تلقائيًا رابط *.workers.dev الذي ينتجه هذا الـ workflow نفسه —
#      يعمل النشر بالكامل بدون أي نطاق مخصّص أو DNS.
#   4. اختياري — لربط نطاق مخصص فعليًا: أضف نطاق safapp.net لحساب Cloudflare،
#      ثم اربط Custom Domain على الـ Worker (api.safapp.net) وعلى مشاريع Pages
#      (safapp.net لـ saf-web، admin.safapp.net لـ saf-admin) من لوحة Cloudflare.

name: "Deploy SAF"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    outputs:
      worker_url: ${{ steps.deploy_worker.outputs.worker_url }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Ensure D1 database and R2 bucket exist
        run: |
          set -euo pipefail
          DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="saf-db") | .uuid' | head -n1)
          if [ -z "$DB_ID" ]; then
            echo "Creating D1 database saf-db…"
            npx wrangler d1 create saf-db
            DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name=="saf-db") | .uuid' | head -n1)
          fi
          if [ -z "$DB_ID" ]; then
            echo "::error::Could not determine D1 database id for saf-db" >&2
            exit 1
          fi
          echo "Using D1 database id: $DB_ID"
          sed -i "s/REPLACE_WITH_PRODUCTION_D1_ID/$DB_ID/" wrangler.toml

          npx wrangler r2 bucket create saf-brand-assets \
            || echo "R2 bucket saf-brand-assets already exists, continuing."

      - name: Apply D1 migrations (remote)
        run: pnpm db:migrate:remote
      - name: Seed Saudi locations dataset (remote, idempotent)
        run: pnpm db:seed:remote
      - name: Deploy Worker
        id: deploy_worker
        run: |
          set -euo pipefail
          OUTPUT=$(pnpm deploy 2>&1 | tee /tmp/deploy-worker.log)
          echo "$OUTPUT"
          URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.workers\.dev' /tmp/deploy-worker.log | head -n1 || true)
          echo "worker_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Ensure required Worker secrets exist (auto-generate if missing)
        run: |
          set -euo pipefail
          EXISTING=$(npx wrangler secret list --env production --format json)
          has_secret() { echo "$EXISTING" | jq -e --arg n "$1" '.[] | select(.name==$n)' >/dev/null 2>&1; }
          if has_secret "JWT_SECRET"; then
            echo "JWT_SECRET already set."
          else
            echo "Generating JWT_SECRET…"
            node -e "console.log(require('crypto').randomBytes(48).toString('hex'))" \
              | npx wrangler secret put JWT_SECRET --env production
          fi
          if has_secret "PHONE_ENCRYPTION_KEY"; then
            echo "PHONE_ENCRYPTION_KEY already set."
          else
            echo "Generating PHONE_ENCRYPTION_KEY…"
            node -e "console.log(require('crypto').randomBytes(32).toString('hex'))" \
              | npx wrangler secret put PHONE_ENCRYPTION_KEY --env production
          fi
          # أسرار واتساب اختيارية — تحتاج قيمًا حقيقية من Meta، لا تُولَّد تلقائيًا.
          # أضفها يدويًا لاحقًا عند الحاجة: wrangler secret put WHATSAPP_TOKEN --env production

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ensure Pages project exists (saf-web)
        run: |
          npx wrangler pages project list --json | jq -e '.[] | select(.name=="saf-web")' >/dev/null \
            || npx wrangler pages project create saf-web --production-branch=main \
            || echo "Pages project create failed or already exists; continuing to deploy step."
        working-directory: apps/web
      - run: pnpm --filter @saf/web build
        env:
          VITE_API_BASE: ${{ vars.API_BASE_URL || needs.deploy-api.outputs.worker_url }}
      - name: Deploy Pages (saf-web)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=saf-web --branch=main

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ensure Pages project exists (saf-admin)
        run: |
          npx wrangler pages project list --json | jq -e '.[] | select(.name=="saf-admin")' >/dev/null \
            || npx wrangler pages project create saf-admin --production-branch=main \
            || echo "Pages project create failed or already exists; continuing to deploy step."
        working-directory: apps/admin
      - run: pnpm --filter @saf/admin build
        env:
          VITE_API_BASE: ${{ vars.API_BASE_URL || needs.deploy-api.outputs.worker_url }}
      - name: Deploy Pages (saf-admin)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          command: pages deploy dist --project-name=saf-admin --branch=main
