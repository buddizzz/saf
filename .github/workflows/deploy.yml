# نشر صفّ على Cloudflare (Workers + Pages)
#
# المتطلبات مرة واحدة:
#   npx wrangler login
#   أنشئ D1:   wrangler d1 create saf-db
#   أنشئ R2:   wrangler r2 bucket create saf-brand-assets
#   حدّث database_id في apps/api/wrangler.toml
#
# أسرار الإنتاج (لا تُرفع إلى Git):
#   cd apps/api
#   wrangler secret put JWT_SECRET
#   wrangler secret put PHONE_ENCRYPTION_KEY
#   wrangler secret put WHATSAPP_TOKEN
#   wrangler secret put WHATSAPP_PHONE_NUMBER_ID
#   wrangler secret put WHATSAPP_VERIFY_TOKEN
#   wrangler secret put WHATSAPP_TEMPLATE_NAME   # اختياري
#
# متغيرات الإنتاج المقترحة في [env.production.vars]:
#   ENVIRONMENT=production
#   ALLOWED_ORIGINS=https://safapp.net,https://www.safapp.net,https://admin.safapp.net
#   PUBLIC_WEB_ORIGIN=https://safapp.net

name: "Deploy SAF"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate:remote
      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm deploy

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @saf/web build
      - name: Deploy Pages (safapp.net)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=saf-web --branch=main

  deploy-admin:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @saf/admin build
      - name: Deploy Pages (admin.safapp.net)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/admin
          command: pages deploy dist --project-name=saf-admin --branch=main
